<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Details - ResumeX</title>
  <link rel="icon" href="./../resume-builder/public/favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #080c18;
      color: #e2eaf8;
      min-height: 100vh;
      padding: 24px;
    }
    .jd-container { max-width: 800px; margin: 0 auto; }
    .jd-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: #a78bfa; text-decoration: none; font-size: 13px; margin-bottom: 20px;
    }
    .jd-back:hover { color: #c4b5fd; }
    .jd-card {
      background: linear-gradient(160deg, rgba(13,20,37,0.96), rgba(9,14,26,0.97));
      border: 1px solid rgba(148, 163, 184, 0.10);
      border-radius: 16px; padding: 28px;
    }
    .jd-loading { text-align: center; padding: 60px 20px; }
    .jd-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(148,163,184,0.12);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: jdspin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes jdspin { to { transform: rotate(360deg); } }
    .jd-loading p { color: #7a8aaa; font-size: 14px; }
    .jd-error { text-align: center; padding: 60px 20px; color: #f87171; font-size: 14px; }
    .jd-header { margin-bottom: 20px; }
    .jd-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .jd-company { font-size: 16px; color: #a78bfa; margin-bottom: 2px; }
    .jd-location { font-size: 13px; color: #7a8aaa; }
    .jd-meta { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .jd-badge { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .jd-badge-remote { background: rgba(16,185,129,0.12); color: #34d399; }
    .jd-badge-source { background: rgba(148,163,184,0.1); color: #94a3b8; text-transform: capitalize; }
    .jd-badge-exp { background: rgba(99,102,241,0.12); color: #818cf8; text-transform: capitalize; }
    .jd-badge-type { background: rgba(245,158,11,0.12); color: #fbbf24; text-transform: capitalize; }
    .jd-salary { font-size: 16px; font-weight: 600; color: #34d399; margin-bottom: 16px; }
    .jd-section { margin-bottom: 20px; }
    .jd-section h3 {
      font-size: 14px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
    }
    .jd-description {
      font-size: 14px; line-height: 1.7; color: #c9d8f0; white-space: pre-wrap;
    }
    .jd-skills { display: flex; flex-wrap: wrap; gap: 6px; }
    .jd-skill-tag {
      padding: 4px 10px; border-radius: 6px;
      background: rgba(124, 58, 237, 0.1); color: #a78bfa; font-size: 12px;
    }
    .jd-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .jd-apply-btn {
      display: inline-block; padding: 12px 24px; border-radius: 10px;
      background: linear-gradient(160deg, #7c3aed, #6d28d9);
      color: #fff; text-decoration: none; font-size: 14px; font-weight: 600;
      transition: filter 0.15s; border: none; cursor: pointer;
    }
    .jd-apply-btn:hover { filter: brightness(1.1); }
    .jd-feature-btn {
      display: inline-block; padding: 12px 20px; border-radius: 10px;
      background: rgba(124, 58, 237, 0.08);
      color: #a78bfa; font-size: 13px; font-weight: 600; border: 1px solid rgba(124, 58, 237, 0.2);
      cursor: pointer; transition: all 0.15s;
    }
    .jd-feature-btn:hover { background: rgba(124, 58, 237, 0.15); border-color: rgba(124, 58, 237, 0.4); }
    .jd-feature-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .jd-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(148,163,184,0.08); }
    .jd-date { font-size: 12px; color: #505d78; margin-top: 12px; }
    .jd-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .jd-modal-content {
      background: linear-gradient(160deg, rgba(13,20,37,0.98), rgba(9,14,26,0.99));
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 16px; padding: 28px; max-width: 700px; width: 100%;
      max-height: 80vh; overflow-y: auto;
    }
    .jd-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .jd-modal-header h3 { font-size: 16px; color: #a78bfa; }
    .jd-modal-close {
      background: none; border: none; color: #7a8aaa; font-size: 24px;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
    }
    .jd-modal-close:hover { background: rgba(148,163,184,0.1); color: #e2eaf8; }
    .jd-modal-body {
      font-size: 14px; line-height: 1.7; color: #c9d8f0; white-space: pre-wrap;
    }
    .jd-modal-loading { text-align: center; padding: 30px; color: #7a8aaa; }
    @media (max-width: 600px) {
      body { padding: 12px; }
      .jd-card { padding: 16px; }
      .jd-actions { flex-direction: column; }
      .jd-apply-btn, .jd-feature-btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="jd-container">
    <a href="#" onclick="window.close(); return false;" class="jd-back">&larr; Back to Job Listings</a>
    <div id="jdContent">
      <div class="jd-loading" id="jdLoading" style="display:none;">
        <div class="jd-spinner"></div>
        <p>Loading job details...</p>
      </div>
      <div class="jd-error" id="jdError" style="display:none;"></div>
      <div class="jd-card" id="jdCard" style="display:none;"></div>
    </div>
  </div>

  <div class="jd-modal" id="jdModal" style="display:none;" onclick="if(event.target===this)closeModal()">
    <div class="jd-modal-content">
      <div class="jd-modal-header">
        <h3 id="jdModalTitle">Loading...</h3>
        <button class="jd-modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="jdModalBody" class="jd-modal-body jd-modal-loading">Processing...</div>
    </div>
  </div>

  <script>
    var SERVER_URL = "http://localhost:5000";
    var lastPdfData = null;
    var lastTailoredText = "";

    function openPdf() {
      if (!lastPdfData) return;
      var w = window.open();
      if (w) {
        w.document.write('<html><body style="margin:0"><embed src="data:application/pdf;base64,' + lastPdfData + '" width="100%" height="100%" type="application/pdf"></body></html>');
        w.focus();
      } else { alert("Allow popups to open the PDF."); }
    }

    function printPdf() {
      if (!lastTailoredText) return;
      var w = window.open();
      if (w) {
        w.document.write('<html><head><style>body{font-family:Georgia,serif;padding:40px;line-height:1.8;font-size:12pt;color:#000;white-space:pre-wrap;}</style></head><body>' + escHtml(lastTailoredText).replace(/\n/g, "<br>") + '</body></html>');
        w.document.close();
        w.focus();
        w.print();
      } else { alert("Allow popups to print."); }
    }

    function loadJob() {
      var stored = null;
      try { stored = JSON.parse(sessionStorage.getItem("jl_selectedJob")); } catch(e) {}

      if (stored && stored.title) {
        renderJob(stored);
        return;
      }

      var params = new URLSearchParams(window.location.search);
      var idx = params.get("idx");
      if (idx !== null) {
        try {
          var cached = JSON.parse(sessionStorage.getItem("jl_cachedJobs"));
          if (cached && cached[parseInt(idx)]) {
            renderJob(cached[parseInt(idx)]);
            return;
          }
        } catch(e) {}
      }

      var jobId = params.get("id");
      if (jobId) {
        document.getElementById("jdLoading").style.display = "block";
        fetch(SERVER_URL + "/api/jobs/detail/" + encodeURIComponent(jobId))
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.success && data.job) {
              renderJob(data.job);
            } else {
              throw new Error(data.error || "Job not found");
            }
          })
          .catch(function(err) {
            document.getElementById("jdLoading").style.display = "none";
            var errEl = document.getElementById("jdError");
            errEl.style.display = "block";
            errEl.textContent = "Error: " + err.message;
          });
        return;
      }

      var err = document.getElementById("jdError");
      err.style.display = "block";
      err.textContent = "No job data found. Please go back to the job listings and click on a job.";
    }

    function renderJob(job) {
      document.getElementById("jdLoading").style.display = "none";
      var card = document.getElementById("jdCard");
      card.style.display = "block";

      var remoteBadge = job.isRemote ? '<span class="jd-badge jd-badge-remote">Remote</span>' : "";
      var sourceBadge = job.source ? '<span class="jd-badge jd-badge-source">' + escHtml(job.source) + "</span>" : "";
      var expBadge = job.experienceLevel ? '<span class="jd-badge jd-badge-exp">' + escHtml(job.experienceLevel) + "</span>" : "";
      var typeBadge = job.jobType ? '<span class="jd-badge jd-badge-type">' + escHtml(job.jobType) + "</span>" : "";

      var skillsHtml = "";
      if (job.skills && job.skills.length > 0) {
        skillsHtml = '<div class="jd-section"><h3>Skills</h3><div class="jd-skills">';
        for (var i = 0; i < job.skills.length; i++) {
          skillsHtml += '<span class="jd-skill-tag">' + escHtml(job.skills[i]) + "</span>";
        }
        skillsHtml += "</div></div>";
      }

      var resumeLoaded = !!localStorage.getItem("jl_resumeText");
      var featureBtns = resumeLoaded
        ? '<button class="jd-feature-btn" onclick="generateCoverLetter()">Cover Letter</button>' +
          '<button class="jd-feature-btn" onclick="generateResume()">Job Fit Resume</button>' +
          '<button class="jd-feature-btn" onclick="startInterview()">Interview</button>'
        : '<button class="jd-feature-btn" onclick="startInterview()">Interview</button>' +
          '<span style="color:#505d78;font-size:12px;">Upload a resume on the listings page to use Cover Letter &amp; Job Fit Resume</span>';

      card.innerHTML =
        '<div class="jd-header">' +
          '<h1 class="jd-title">' + escHtml(job.title) + "</h1>" +
          '<div class="jd-company">' + escHtml(job.company) + "</div>" +
          '<div class="jd-location">' + escHtml(job.location || "") + "</div>" +
        "</div>" +
        '<div class="jd-meta">' + expBadge + typeBadge + remoteBadge + sourceBadge + "</div>" +
        (job.salary ? '<div class="jd-salary">' + escHtml(job.salary) + "</div>" : "") +
        '<div class="jd-section"><h3>Job Description</h3><div class="jd-description">' + escHtml(job.description || "No description available.") + "</div></div>" +
        skillsHtml +
        '<div class="jd-footer">' +
          '<div class="jd-actions">' +
            (job.url
              ? '<a href="' + escHtml(job.url) + '" target="_blank" class="jd-apply-btn">Apply on ' + escHtml(job.source || "website") + "</a>"
              : '<p style="color:#505d78;font-size:13px;">No direct apply link available.</p>') +
            featureBtns +
          "</div>" +
          '<div class="jd-date">' +
            (job.datePosted ? "Posted: " + job.datePosted + " &middot; " : "") +
            "Fetched: " + new Date(job.fetchedAt).toLocaleDateString() +
          "</div>" +
        "</div>";
    }

    function startInterview() {
      var stored = JSON.parse(sessionStorage.getItem("jl_selectedJob"));
      localStorage.setItem("prefill_jobDesc", stored.description || "");
      localStorage.setItem("prefill_jobTitle", stored.title || "");
      var resumeText = localStorage.getItem("jl_resumeText") || "";
      if (resumeText) localStorage.setItem("prefill_resumeText", resumeText);
      window.location.href = "/interviewer/";
    }

    function escHtml(s) {
      if (!s) return "";
      var d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function showModal(title, bodyHtml) {
      document.getElementById("jdModalTitle").textContent = title;
      document.getElementById("jdModalBody").innerHTML = bodyHtml;
      document.getElementById("jdModalBody").className = "jd-modal-body";
      document.getElementById("jdModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("jdModal").style.display = "none";
    }

    var lastCoverLetter = "";

    function generateCoverLetter() {
      var resumeText = localStorage.getItem("jl_resumeText");
      if (!resumeText) { alert("Upload a resume first on the job listings page."); return; }
      var stored = JSON.parse(sessionStorage.getItem("jl_selectedJob"));
      showModal("Cover Letter", '<div class="jd-modal-loading">Generating cover letter...</div>');
      fetch(SERVER_URL + "/api/generate-cover-letter", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ resumeText: resumeText, jobDescription: stored.description, jobTitle: stored.title })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          lastCoverLetter = data.coverLetter;
          showModal("Cover Letter",
            '<div style="margin-bottom:16px;text-align:right">' +
              '<button class="jd-feature-btn" onclick="downloadCoverLetterPDF()">Download PDF</button>' +
            "</div>" +
            '<div class="jd-description" id="clText">' + escHtml(data.coverLetter).replace(/\n/g, "<br>") + "</div>"
          );
        } else {
          showModal("Cover Letter", "Error: " + escHtml(data.error || "Generation failed"));
        }
      })
      .catch(function(err) { showModal("Cover Letter", "Error: " + escHtml(err.message)); });
    }

    function downloadCoverLetterPDF() {
      var text = lastCoverLetter;
      if (!text) return;
      var win = window.open();
      if (!win) {
        alert("Please allow popups to download the PDF.");
        return;
      }
      win.document.write(
        '<!DOCTYPE html><html><head><meta charset="utf-8">' +
        '<style>body{font-family:Georgia,serif;padding:40px;line-height:1.8;font-size:12pt;color:#000;white-space:pre-wrap;max-width:700px;margin:0 auto;}</style>' +
        '</head><body>' + escHtml(text).replace(/\n/g, "<br>") + '</body></html>'
      );
      win.document.close();
      win.focus();
      win.print();
    }

    function lineDiff(original, tailored) {
      var oLines = (original || "").split("\n");
      var tLines = (tailored || "").split("\n");
      var html = '<div style="font-family:monospace;font-size:13px;line-height:1.6;max-height:500px;overflow-y:auto;">';
      var oIdx = 0, tIdx = 0;
      while (oIdx < oLines.length || tIdx < tLines.length) {
        var oLine = oLines[oIdx] || "";
        var tLine = tLines[tIdx] || "";
        if (oLine === tLine) {
          html += '<div style="color:#94a3b8;padding:2px 8px;">' + escHtml(oLine) + "</div>";
          oIdx++; tIdx++;
        } else {
          var found = false;
          for (var look = 1; look <= 3; look++) {
            if (oIdx + look < oLines.length && oLines[oIdx + look] === tLine) {
              for (var k = 0; k < look; k++) {
                html += '<div style="color:#ef4444;background:rgba(239,68,68,0.08);padding:2px 8px;border-left:2px solid #ef4444;">-' + escHtml(oLines[oIdx + k]) + "</div>";
              }
              html += '<div style="color:#94a3b8;padding:2px 8px;">' + escHtml(tLine) + "</div>";
              oIdx += look + 1; tIdx++;
              found = true; break;
            }
            if (tIdx + look < tLines.length && tLines[tIdx + look] === oLine) {
              for (var k2 = 0; k2 < look; k2++) {
                html += '<div style="color:#34d399;background:rgba(52,211,153,0.08);padding:2px 8px;border-left:2px solid #34d399;">+' + escHtml(tLines[tIdx + k2]) + "</div>";
              }
              html += '<div style="color:#94a3b8;padding:2px 8px;">' + escHtml(oLine) + "</div>";
              oIdx++; tIdx += look + 1;
              found = true; break;
            }
          }
          if (!found) {
            html += '<div style="color:#ef4444;background:rgba(239,68,68,0.08);padding:2px 8px;border-left:2px solid #ef4444;">-' + escHtml(oLine) + "</div>";
            html += '<div style="color:#34d399;background:rgba(52,211,153,0.08);padding:2px 8px;border-left:2px solid #34d399;">+' + escHtml(tLine) + "</div>";
            oIdx++; tIdx++;
          }
        }
      }
      return html + "</div>";
    }

    function generateResume() {
      var resumeText = localStorage.getItem("jl_resumeText");
      if (!resumeText) { alert("Upload a resume first on the job listings page."); return; }
      var stored = JSON.parse(sessionStorage.getItem("jl_selectedJob"));
      showModal("Job Fit Resume", '<div class="jd-modal-loading">Generating tailored resume...</div>');
      fetch(SERVER_URL + "/generate-job-specific-resume", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ resumeText: resumeText, jobDescription: stored.description, jobTitle: stored.title })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success && data.pdf) {
          lastPdfData = data.pdf;
          lastTailoredText = data.tailoredText || "";

          var pdfBlock =
            '<div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;">' +
              '<button class="jd-feature-btn" onclick="openPdf()">Open PDF</button>' +
              
            "</div>";

          var diffHtml = "";
          if (data.changes && data.changes.length) {
            var items = data.changes.map(function(c) {
              return '<div style="display:flex;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(148,163,184,0.04);border:1px solid rgba(148,163,184,0.06);margin-bottom:6px;font-size:13px;line-height:1.5;color:#c9d8f0;">' +
                '<span style="color:#7c3aed;font-weight:700;flex-shrink:0;">~</span>' +
                '<span>' + escHtml(c) + '</span>' +
              '</div>';
            }).join("");
            diffHtml =
              '<div style="margin-top:16px;">' +
                '<h4 style="margin-bottom:10px;font-size:14px;font-weight:600;color:#94a3b8;">' +
                  'Changes Made <span style="font-weight:400;font-size:12px;color:#505d78;">(' + data.changes.length + ')</span>' +
                "</h4>" +
                items +
              "</div>";
          }

          showModal("Job Fit Resume", pdfBlock + diffHtml);
        } else if (data.success && data.html) {
          showModal("Job Fit Resume", data.html);
        } else {
          showModal("Job Fit Resume", "Error: " + escHtml(data.error || "Generation failed"));
        }
      })
      .catch(function(err) { showModal("Job Fit Resume", "Error: " + escHtml(err.message)); });
    }

    loadJob();
  </script>
</body>
</html>
