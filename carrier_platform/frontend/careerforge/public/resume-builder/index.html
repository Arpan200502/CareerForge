<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/resume-builder/" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="/shared-shell.css" />
  <title>Resume Builder - CareerForge</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="128x128" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
<style>
  body.preload .container {
    opacity: 0;
    transform: translateY(20px);
  }
</style>

  <!-- Disable browser scroll restoration -->
  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }
  </script>
</head>
<script>
  window.addEventListener("load", () => {
    // Force a paint frame before toggling classes
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.body.classList.remove("preload");
        document.body.classList.add("loaded");
      });
    });
  });
</script>


 



  <body class="preload">

    
    <div class="container">
      
      <!-- LEFT PANEL -->
       
      <div class="panel">
        
        <h1>AI Resume Builder</h1>
        <p class="subtitle">Powered by Groq LLaMA-3.3</p>
        <div class="builder-toolbar">
          <h4>Demo Job Inputs</h4>
          <div class="builder-actions">
            <button id="resumeDemo1" type="button" class="demo-btn">Option 1</button>
            <button id="resumeDemo2" type="button" class="demo-btn hidden"></button>
          </div>
          
        </div>

        <div class="builder-scroll">
          <div class="form-group">
            <label for="templateSelect">Template</label>
            <select id="templateSelect">
              <option value="ats">ATS</option>
              <option value="olivia">ATS Split</option>
              <option value="academic">ACADEMIC STYLE</option>
            </select>
          </div>

          <div class="form-group">
            <label>Personal Information👤</label>
            <textarea id="personalInfo" placeholder="Name, Email, Phone, GitHub, etc."></textarea>
            <div class="field-audio-row">
              <button type="button" class="btn mic-btn" data-target="personalInfo"></button>
            </div>
          </div>

          <div class="form-group">
            <label>Education🎓</label>
            <textarea id="education"></textarea>
            <div class="field-audio-row">
              <button type="button" class="btn mic-btn" data-target="education"></button>
            </div>
          </div>

          <div class="form-group">
            <label>Experience💼</label>
            <textarea id="experience"></textarea>
            <div class="field-audio-row">
              <button type="button" class="btn mic-btn" data-target="experience"></button>
            </div>
          </div>

          <div class="form-group">
            <label>Projects📂</label>
            <textarea id="projects"></textarea>
            <div class="field-audio-row">
              <button type="button" class="btn mic-btn" data-target="projects"></button>
            </div>
          </div>

          <div class="form-group">
            <label>Skills🛠️</label>
            <textarea id="skills"></textarea>
            <div class="field-audio-row">
              <button type="button" class="btn mic-btn" data-target="skills"></button>
            </div>
          </div>

          <div class="form-group">
            <label>Extracurricular🏆</label>
            <textarea id="extracurricular"></textarea>
            <div class="field-audio-row">
              <button type="button" class="btn mic-btn" data-target="extracurricular"></button>
            </div>
          </div>

          <button class="btn" id="generateBtn">Generate Resume with AI</button>

          <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating your resume...</p>
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="panel">
        <div class="preview-header-wrap">
          <h1>Resume Preview</h1>
          <p class="subtitle preview-subtitle">Live output sized to stay inside the viewport.</p>
        </div>

        <div class="preview-shell">
          <iframe id="resumeFrame"></iframe>
        </div>

        <div class="action-buttons">
          <button class="btn" id="downloadBtn" disabled>Download PDF</button>
          <button class="btn" id="editLatexBtn" style="display:none;">Edit Resume</button>
        </div>

        <div id="latexEditorPanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
          <div style="background:#1e1e1e; width:80%; height:80%; border-radius:12px; display:flex; flex-direction:column; padding:20px; gap:12px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <h3 style="color:#fff; margin:0;">Edit LaTeX Source</h3>
              <button id="closeEditorBtn" class="btn" style="padding:6px 14px;">✕ Close</button>
            </div>
            <p style="color:#aaa; margin:0; font-size:13px;">Edit the text directly. Only change content inside the curly braces - don't modify LaTeX commands.</p>
            <textarea id="latexEditorTextarea" style="flex:1; background:#2d2d2d; color:#f0f0f0; border:1px solid #444; border-radius:8px; padding:14px; font-family:monospace; font-size:13px; resize:none; line-height:1.6;"></textarea>
            <div style="display:flex; justify-content:flex-end; gap:10px;">
              <button id="recompileBtn" class="btn">Recompile PDF</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script type="module" src="/shared-shell.js"></script>
  </body>
</html>
